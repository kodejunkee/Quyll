<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background Gradient: Deep Night to Royal Violet -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090E1A" />
      <stop offset="50%" stop-color="#141B33" />
      <stop offset="100%" stop-color="#281147" />
    </linearGradient>

    <!-- Inner Glow Ring Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CC9F0" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#7209B7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#F72585" stop-opacity="0.45" />
    </linearGradient>

    <!-- Quill Body Gradient: Vibrant Electric Cyan to Neon Magenta -->
    <linearGradient id="quillGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#4CC9F0" />
      <stop offset="45%" stop-color="#4895EF" />
      <stop offset="75%" stop-color="#7209B7" />
      <stop offset="100%" stop-color="#F72585" />
    </linearGradient>

    <!-- Nib Tip Accent Gradient -->
    <linearGradient id="nibGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F72585" />
      <stop offset="100%" stop-color="#FF9E00" />
    </linearGradient>

    <!-- Glow Filter for Sparkles -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main Squircle Background Badge -->
  <rect x="48" y="48" width="928" height="928" rx="232" ry="232" fill="url(#bgGrad)" />

  <!-- Sleek Glowing Border/Ring -->
  <rect x="64" y="64" width="896" height="896" rx="216" ry="216" fill="none" stroke="url(#borderGrad)" stroke-width="6" />

  <!-- Background Creative Glow/Aura beneath the Quill -->
  <circle cx="512" cy="512" r="260" fill="#4CC9F0" opacity="0.08" filter="url(#glow)" />
  <circle cx="430" cy="590" r="180" fill="#F72585" opacity="0.08" filter="url(#glow)" />

  <g transform="translate(48, 48)">
    <!-- Main Stylized Feather / Fountain Pen Quill -->
    <!-- Outer Silhouette -->
    <path d="M 720 180 C 650 180, 520 230, 420 330 C 330 420, 280 540, 260 630 L 210 740 C 200 762, 218 780, 240 770 L 350 720 C 440 700, 560 650, 650 560 C 750 460, 800 330, 800 260 C 800 215, 765 180, 720 180 Z" 
          fill="url(#quillGrad)" filter="url(#glow)" />

    <!-- Quill Feather Vanes Cutouts (Sleek Geometric Lines giving aerodynamic feather texture) -->
    <path d="M 640 260 C 610 300, 570 350, 530 390 L 510 370 C 550 330, 590 280, 620 240 Z" fill="#090E1A" opacity="0.4" />
    <path d="M 580 320 C 540 370, 490 430, 440 480 L 420 460 C 470 410, 520 350, 560 300 Z" fill="#090E1A" opacity="0.4" />
    <path d="M 520 380 C 480 430, 430 490, 380 540 L 360 520 C 410 470, 460 410, 500 360 Z" fill="#090E1A" opacity="0.4" />

    <!-- Central Quill Shaft / Spine -->
    <path d="M 760 220 C 680 300, 540 440, 410 570 C 340 640, 275 690, 225 755" 
          fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.85" />

    <!-- Pen Nib Tip Detail (Gold/Orange Neon Tip where the ink flows) -->
    <path d="M 270 660 L 225 755 L 320 710 Z" fill="url(#nibGrad)" />
    <circle cx="280" cy="690" r="14" fill="#090E1A" />
    <line x1="225" y1="755" x2="272" y2="697" stroke="#090E1A" stroke-width="6" stroke-linecap="round" />

    <!-- Magic Creative Sparks floating from the tip -->
    <!-- Sparkle 1 -->
    <path d="M 180 620 Q 180 590 150 590 Q 180 590 180 560 Q 180 590 210 590 Q 180 590 180 620 Z" 
          fill="#4CC9F0" filter="url(#glow)" opacity="0.9" />
    <!-- Sparkle 2 -->
    <path d="M 330 810 Q 330 790 310 790 Q 330 790 330 770 Q 330 790 350 790 Q 330 790 330 810 Z" 
          fill="#F72585" filter="url(#glow)" opacity="0.9" />
    <!-- Sparkle 3 -->
    <circle cx="160" cy="740" r="8" fill="#FF9E00" filter="url(#glow)" />
    <circle cx="390" cy="760" r="6" fill="#4CC9F0" opacity="0.7" />
  </g>
</svg>
